<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Firebase Chat with Images</title>
<!-- Firebase SDKs -->
<script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-firestore.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-storage.js"></script>
<style>
  body { font-family: Arial, sans-serif; margin: 20px; }
  #userSection { margin-bottom: 20px; }
  #messages { border: 1px solid #ccc; height: 300px; overflow-y: scroll; padding: 10px; }
  #messages div { margin-bottom: 10px; }
  #chatInput { width: 60%; }
</style>
</head>
<body>

<h1>Firebase Chat with Images</h1>

<div id="userSection">
  <div id="authSection">
    <h2>Register / Login</h2>
    <input type="email" id="email" placeholder="Email" />
    <input type="password" id="password" placeholder="Password" />
    <br />
    <button onclick="signUp()">Sign Up</button>
    <button onclick="login()">Login</button>
  </div>
  <div id="welcomeSection" style="display:none;">
    <p>Welcome, <span id="userName"></span>!</p>
    <button onclick="logout()">Logout</button>
  </div>
</div>

<div id="chatSection" style="display:none;">
  <div id="messages"></div>
  <br />
  <input type="text" id="chatInput" placeholder="Type a message" />
  <button onclick="sendMessage()">Send</button>
  <br /><br />
  <input type="file" id="imageUpload" />
  <button onclick="sendImage()">Send Image</button>
</div>

<script>
  // TODO: Replace with your Firebase project configuration
  const firebaseConfig = {
    apiKey: "YOUR_API_KEY",
    authDomain: "YOUR_AUTH_DOMAIN",
    projectId: "YOUR_PROJECT_ID",
    storageBucket: "YOUR_STORAGE_BUCKET",
    messagingSenderId: "YOUR_MESSAGING_SENDER_ID",
    appId: "YOUR_APP_ID"
  };

  // Initialize Firebase
  const app = firebase.initializeApp(firebaseConfig);
  const auth = firebase.auth();
  const db = firebase.firestore();
  const storage = firebase.storage();

  // Monitor auth state
  auth.onAuthStateChanged(user => {
    if (user) {
      document.getElementById('authSection').style.display = 'none';
      document.getElementById('welcomeSection').style.display = 'block';
      document.getElementById('userName').innerText = user.email;
      document.getElementById('chatSection').style.display = 'block';
      loadMessages();
    } else {
      document.getElementById('authSection').style.display = 'block';
      document.getElementById('welcomeSection').style.display = 'none';
      document.getElementById('chatSection').style.display = 'none';
    }
  });

  function signUp() {
    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;
    auth.createUserWithEmailAndPassword(email, password)
      .catch(error => alert(error.message));
  }

  function login() {
    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;
    auth.signInWithEmailAndPassword(email, password)
      .catch(error => alert(error.message));
  }

  function logout() {
    auth.signOut();
  }

  // Load chat messages
  function loadMessages() {
    const messagesDiv = document.getElementById('messages');
    db.collection('messages').orderBy('timestamp')
      .onSnapshot(snapshot => {
        messagesDiv.innerHTML = '';
        snapshot.forEach(doc => {
          const msg = doc.data();
          if (msg.type === 'text') {
            messagesDiv.innerHTML += `<div><strong>${msg.sender}:</strong> ${msg.content}</div>`;
          } else if (msg.type === 'image') {
            messagesDiv.innerHTML += `<div><strong>${msg.sender}:</strong><br /><img src="${msg.content}" width="200" /></div>`;
          }
        });
        messagesDiv.scrollTop = messagesDiv.scrollHeight;
      });
  }

  // Send text message
  function sendMessage() {
    const content = document.getElementById('chatInput').value;
    if (content.trim() === '') return;
    db.collection('messages').add({
      sender: auth.currentUser.email,
      content: content,
      type: 'text',
      timestamp: firebase.firestore.FieldValue.serverTimestamp()
    });
    document.getElementById('chatInput').value = '';
  }

  // Send image
  function sendImage() {
    const file = document.getElementById('imageUpload').files[0];
    if (!file) return;
    const storageRef = storage.ref().child('images/' + Date.now() + '_' + file.name);
    storageRef.put(file).then(() => {
      storageRef.getDownloadURL().then(url => {
        db.collection('messages').add({
          sender: auth.currentUser.email,
          content: url,
          type: 'image',
          timestamp: firebase.firestore.FieldValue.serverTimestamp()
        });
      });
    });
  }
</script>

</body>
</html>
